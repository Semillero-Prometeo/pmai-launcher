services:
  nats-server:
    image: nats:2.11.0-alpine3.21
    ports:
      - "8222:8222"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf
    command: "-c /etc/nats/nats.conf"

  pmai-core:
    build:
      context: ./pmai-mai-core
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./pmai-mai-core:/app
    environment:
      NATS_SERVER: nats://nats-server:4222
      PMAI_SETTINGS: /app/settings.toml
    depends_on:
      - nats
    ports:
      - "8000:8000"
    privileged: true
    command: ["/bin/bash", "-lc", "python -m pmai_core /app/settings.toml"]
