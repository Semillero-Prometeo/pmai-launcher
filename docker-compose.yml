services:
  nats-server:
    image: nats:2.11.0-alpine3.21
    ports:
      - "8222:8222"
      - "4222:4222"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf
    command: "-c /etc/nats/nats.conf"

  pmai-core:
    build:
      context: ./pmai-mai-core
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./pmai-mai-core:/app
      - ./data:/data:ro
    environment:
      NATS_SERVER: nats://nats-server:4222
      PMAI_SETTINGS: /app/settings.toml
      PYTHONPATH: /app/src
    depends_on:
      - nats-server
    ports:
      - "8000:8000"
    privileged: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # V4L2 devices — only needed on native Linux (production).
    # On WSL2 these may not work; use camera.sources in settings.toml instead.
    # devices:
    #   - /dev/video0:/dev/video0
    #   - /dev/video1:/dev/video1
    command:
      - /bin/bash
      - -lc
      - >
        watchfiles "python -m pmai_core /app/settings.toml" /app/src
